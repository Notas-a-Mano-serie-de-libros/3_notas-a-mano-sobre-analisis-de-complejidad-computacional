name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest numpy matplotlib ipywidgets scipy scikit-learn sympy
      - name: Check notebooks are clean
        run: python scripts/clean_notebooks.py --check
      - name: Compile Python files
        run: python -m compileall -q capitulo7/domain capitulo8/domain common scripts tests
      - name: Run tests
        run: python -m pytest
      - name: Run quick animation benchmark
        run: python scripts/benchmark_animations.py --repeats 1 --json
