name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  notebooks-clean:
    name: Check notebooks are clean
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - name: Check notebooks
        run: |
          mkdir -p artifacts
          set -o pipefail
          python scripts/clean_notebooks.py --check --diagnose | tee artifacts/notebook-diagnostics.txt
      - name: Upload notebook diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notebook-diagnostics
          path: artifacts/notebook-diagnostics.txt
          if-no-files-found: warn

  lint-python:
    name: Lint Python files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt
      - name: Run Ruff
        run: ruff check capitulo7 capitulo8 common scripts tests

  colab-sanity:
    name: Validate Colab launchers and links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - name: Validate Colab bootstrap files
        run: python scripts/validate_colab_bootstrap.py
      - name: Validate GitHubColab links
        run: python scripts/validate_colab_links.py
      - name: Validate notebook launchers
        run: python scripts/validate_notebook_launchers.py
      - name: Validate size budgets
        run: python scripts/validate_size_budgets.py
      - name: Validate HTML snapshots
        run: python scripts/validate_html_snapshots.py

  tests:
    name: Tests Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs:
      - notebooks-clean
      - lint-python
      - colab-sanity
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt
      - name: Compile Python files
        run: python -m compileall -q capitulo7/domain capitulo8/domain common scripts tests
      - name: Run tests
        run: |
          mkdir -p artifacts
          python -m pytest -q --junitxml=artifacts/pytest-${{ matrix.python-version }}.xml
      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.python-version }}
          path: artifacts/pytest-${{ matrix.python-version }}.xml
          if-no-files-found: warn

  benchmark:
    name: Quick animation benchmark
    runs-on: ubuntu-latest
    needs:
      - tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt
      - name: Run benchmark
        run: |
          mkdir -p artifacts
          python scripts/benchmark_animations.py --repeats 3 --max-ms 1500 --output artifacts/animation-benchmark.json --json
          python scripts/validate_benchmark_report.py --report artifacts/animation-benchmark.json
      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: animation-benchmark
          path: artifacts/animation-benchmark.json
          if-no-files-found: warn

  security:
    name: Audit Python dependencies
    runs-on: ubuntu-latest
    needs:
      - notebooks-clean
      - lint-python
      - colab-sanity
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt
      - name: Run pip-audit
        run: |
          mkdir -p artifacts
          python -m pip_audit -r requirements-ci.txt --progress-spinner off --format json --output artifacts/pip-audit.json
      - name: Upload dependency audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit
          path: artifacts/pip-audit.json
          if-no-files-found: warn
