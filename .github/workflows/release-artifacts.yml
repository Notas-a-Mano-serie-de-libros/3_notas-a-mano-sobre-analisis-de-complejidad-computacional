name: Release Artifacts

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-artifacts:
    name: Build release artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt
      - name: Validate project
        run: |
          python scripts/clean_notebooks.py --check --diagnose
          python scripts/validate_colab_bootstrap.py
          python scripts/validate_colab_links.py
          python scripts/validate_notebook_launchers.py
          python scripts/validate_size_budgets.py
          python scripts/validate_html_snapshots.py
      - name: Build reports
        run: |
          mkdir -p artifacts
          python scripts/benchmark_animations.py --repeats 3 --max-ms 1500 --output artifacts/animation-benchmark.json --json
          python scripts/validate_benchmark_report.py --report artifacts/animation-benchmark.json
          python scripts/clean_notebooks.py --check --diagnose > artifacts/notebook-diagnostics.txt
          python scripts/validate_colab_bootstrap.py > artifacts/colab-bootstrap.txt
          python scripts/validate_colab_links.py > artifacts/colab-links.txt
      - name: Package project
        run: |
          mkdir -p artifacts/package
          rsync -a \
            --exclude '.git' \
            --exclude '.pytest_cache' \
            --exclude '.ruff_cache' \
            --exclude '__pycache__' \
            --exclude 'artifacts' \
            ./ artifacts/package/
          cd artifacts/package
          zip -qr ../proyecto-notas-a-mano.zip .
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: artifacts
          if-no-files-found: error
